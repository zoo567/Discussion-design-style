      byId('navHint').textContent = modeHints[mode] || modeHints.preview;
      requestAnimationFrame(() => {
        updateStickyMetrics();
        updateAnalysisStageMetrics();
        if (mode === 'analysis') syncAnalysisIndex();
      });
    }

    function setTierFilter(value) {
      activeTierFilter = value;
      byId('tierFilter').value = value;
      document.querySelectorAll('.preview-toolbar').forEach(node => node.dataset.filter = value);
      renderPreview();
      renderAnalysis();
      analysisFirstScrollPending = true;
      if (document.body.dataset.mode === 'analysis') {
        requestAnimationFrame(() => {
          const first = currentAnalysisSamples()[0];
          if (first) jumpToAnalysis(first.id, 'auto');
        });
      }
    }

    function updateStickyMetrics() {
      const navH = byId('navShell').getBoundingClientRect().height;
      document.documentElement.style.setProperty('--mode-h', `${Math.ceil(navH)}px`);
      updateAnalysisStageMetrics();
    }

    let compactHeader = false;
    let analysisWheelLocked = false;
    let analysisWheelDelta = 0;
    let analysisWheelTimer = null;
    let analysisFirstScrollPending = true;
    function handleScroll() {
      const shouldCompact = compactHeader ? window.scrollY > 24 : window.scrollY > 64;
      scheduleAnalysisSync();
      if (document.body.dataset.mode === 'analysis') updateAnalysisStageMetrics();
      if (shouldCompact === compactHeader) return;
      compactHeader = shouldCompact;
      document.body.classList.toggle('is-scrolled', compactHeader);
      requestAnimationFrame(updateStickyMetrics);
    }

    function handleAnalysisWheel(event) {
      if (document.body.dataset.mode !== 'analysis') return;
      if (byId('viewer').classList.contains('open') || byId('detailViewer').classList.contains('open')) return;
      if (event.target.closest('.topbar, .nav-shell, .analysis-index, .viewer, .detail-viewer')) return;
      if (Math.abs(event.deltaY) < Math.abs(event.deltaX)) return;
      const list = currentAnalysisSamples();
      if (!list.length) return;
      const currentId = activeAnalysisId();
      const currentIndex = Math.max(0, list.findIndex(item => item.id === currentId));
      if (event.deltaY < 0 && currentIndex === 0 && currentId && isAnalysisItemSettled(currentId)) return;
      if (event.deltaY > 0 && currentIndex === list.length - 1 && currentId && isAnalysisItemSettled(currentId)) return;
      event.preventDefault();
      if (analysisWheelLocked) {
        return;
      }
      analysisWheelDelta += event.deltaY;
      clearTimeout(analysisWheelTimer);
      analysisWheelTimer = window.setTimeout(() => { analysisWheelDelta = 0; }, 180);
      if (Math.abs(analysisWheelDelta) < 72) return;
      const direction = analysisWheelDelta > 0 ? 1 : -1;
      const shouldSettleCurrent = currentId && (analysisFirstScrollPending || !isAnalysisItemSettled(currentId));
      const moved = shouldSettleCurrent ? jumpToAnalysis(currentId) : moveAnalysis(direction, currentId);
      if (moved) analysisFirstScrollPending = false;
      analysisWheelDelta = 0;
      if (!moved) return;
      analysisWheelLocked = true;
      window.setTimeout(() => { analysisWheelLocked = false; }, 760);
    }

    async function copyQuestions() {
      const text = questions.map((q, i) => `Q${i + 1} ${q}`).join('\n\n');
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const area = document.createElement('textarea');
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand('copy');
        area.remove();
      }
      const toast = byId('toast');
      toast.textContent = '已复制全部问题';
      toast.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
    }

    async function copyText(text, message = '已复制') {
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const area = document.createElement('textarea');
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand('copy');
        area.remove();
      }
      const toast = byId('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
    }

    document.addEventListener('click', event => {
      const modeBtn = event.target.closest('.mode-tab');
      if (modeBtn) setMode(modeBtn.dataset.mode);
      const colorBtn = event.target.closest('[data-copy-color]');
      if (colorBtn) {
        event.stopPropagation();
        copyText(colorBtn.dataset.copyColor, `已复制 ${colorBtn.dataset.copyColor}`);
        return;
      }
      const analysisMove = event.target.closest('[data-analysis-move]');
      if (analysisMove) {
        analysisFirstScrollPending = false;
        moveAnalysis(Number(analysisMove.dataset.analysisMove), analysisMove.dataset.analysisFrom);
        return;
      }
      const analysisJump = event.target.closest('[data-analysis-jump]');
      if (analysisJump) {
        analysisFirstScrollPending = false;
        jumpToAnalysis(analysisJump.dataset.analysisJump);
        return;
      }
      const viewBtn = event.target.closest('[data-view-id]');
      if (viewBtn) {
        event.stopPropagation();
        const sample = samples.find(item => item.id === viewBtn.dataset.viewId);
        if (sample) openViewer(sample, viewBtn.closest('#preview') ? currentFilteredSamples() : [sample]);
        return;
      }
      const detailCard = event.target.closest('[data-detail-id]');
      if (detailCard) {
        const sample = samples.find(item => item.id === detailCard.dataset.detailId);
        if (sample) openDetail(sample);
      }
    });
    document.addEventListener('keydown', event => {
      const detailCard = event.target.closest?.('[data-detail-id]');
      if (detailCard && (event.key === 'Enter' || event.key === ' ')) {
        event.preventDefault();
        const sample = samples.find(item => item.id === detailCard.dataset.detailId);
        if (sample) openDetail(sample);
      }
    });
    byId('tierFilter').addEventListener('change', event => setTierFilter(event.target.value));
    byId('viewerClose').addEventListener('click', closeViewer);
    byId('viewerPrev').addEventListener('click', () => moveViewer(-1));
    byId('viewerNext').addEventListener('click', () => moveViewer(1));
    byId('viewer').addEventListener('click', event => { if (event.target.id === 'viewer') closeViewer(); });
    byId('detailClose').addEventListener('click', closeDetail);
    byId('detailViewer').addEventListener('click', event => { if (event.target.id === 'detailViewer') closeDetail(); });
    byId('copyQuestions').addEventListener('click', copyQuestions);
    window.addEventListener('scroll', handleScroll, { passive: true });
    window.addEventListener('wheel', handleAnalysisWheel, { passive: false });
    window.addEventListener('resize', updateStickyMetrics);
    document.addEventListener('load', event => {
      if (event.target?.matches?.('#analysisList img')) {
        updateAnalysisStageMetrics();
        scheduleAnalysisSync();
      }
    }, true);
    document.addEventListener('keydown', event => {
      if (byId('viewer').classList.contains('open')) {
        if (event.key === 'ArrowLeft') moveViewer(-1);
        if (event.key === 'ArrowRight') moveViewer(1);
      }
      if (event.key === 'Escape') {
        closeViewer();
        closeDetail();
      }
    });

    setHeaderMetrics();
    document.body.dataset.mode = 'preview';
    renderPreview();
    renderAnalysis();
    renderQuestions();
    updateStickyMetrics();
    setTimeout(updateStickyMetrics, 60);
  </script>
</body>
</html>
