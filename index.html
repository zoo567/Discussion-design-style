  <style>
    :root {
      --bg: #f7f7f5;
      --paper: #fffefa;
      --paper-soft: #fbfaf7;
      --ink: #11110f;
      --muted: #77766f;
      --line: #deddd8;
      --line-soft: #ecebe7;
      --yellow: #fff14a;
      --yellow-deep: #d8ca26;
      --pink: #f24fc1;
      --purple: #d9c7ff;
      --green: #bdf266;
      --shadow: 0 22px 54px rgba(17,17,15,.07);
      --header-h: 134px;
      --mode-h: 78px;
      font-family: "PingFang SC", "PingFang TC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: "PingFang SC", "PingFang TC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    button, select { font: inherit; }
    button { cursor: pointer; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(247,247,245,.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--line-soft);
      transition: background .28s ease, box-shadow .28s ease;
    }
    .topbar-inner {
      min-height: 134px;
      padding: 34px 42px 25px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 44px;
      transition: min-height .28s ease, padding .28s ease;
    }
    .brand-zone {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      min-width: 0;
    }
    .brand-title {
      margin: 0;
      font-size: clamp(36px, 4.1vw, 58px);
      line-height: .98;
      font-weight: 400;
      letter-spacing: -0.085em;
      white-space: nowrap;
      transition: font-size .28s ease, letter-spacing .28s ease;
    }
    .design-lockup {
      display: inline-flex;
      align-items: center;
      height: 42px;
      margin-bottom: 2px;
      overflow: hidden;
      transition: opacity .24s ease, width .28s ease, margin .28s ease, transform .28s ease;
      flex: 0 0 auto;
    }
    .design-word {
      height: 36px;
      padding: 0 18px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      line-height: 1;
      font-weight: 400;
      letter-spacing: -0.05em;
      background: var(--paper);
    }
    .design-arrow {
      width: 38px;
      height: 38px;
      margin-left: 2px;
      border: 2px solid var(--ink);
      border-radius: 50%;
      background: var(--yellow);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .design-arrow svg { width: 24px; height: 16px; display: block; }
    .data-zone {
      position: relative;
      display: flex;
      align-items: flex-end;
      gap: clamp(30px, 5vw, 72px);
      padding-bottom: 1px;
      transition: gap .28s ease;
    }
    .data-item {
      display: grid;
      grid-template-columns: auto auto;
      grid-template-rows: 12px auto;
      column-gap: 8px;
      align-items: end;
      color: var(--ink);
    }
    .data-item strong {
      grid-row: 1 / span 2;
      grid-column: 1;
      font-size: clamp(38px, 4.1vw, 58px);
      line-height: .82;
      font-weight: 300;
      letter-spacing: -0.06em;
      transition: font-size .28s ease;
    }
    .data-dot {
      grid-row: 1;
      grid-column: 2;
      justify-self: end;
      align-self: start;
      width: 20px;
      height: 8px;
      border-radius: 999px;
      background: var(--ink);
      margin-top: 0;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
      transition: width .28s ease, height .28s ease;
    }
    .data-dot.pink { background: var(--pink); }
    .data-dot.purple { background: var(--purple); }
    .data-item span:last-child {
      grid-row: 2;
      grid-column: 2;
      justify-self: end;
      color: var(--muted);
      font-size: 15px;
      line-height: 1;
      font-weight: 400;
      white-space: nowrap;
      letter-spacing: -0.02em;
      transition: font-size .28s ease;
    }
    .data-popover {
      position: absolute;
      right: 0;
      top: calc(100% + 18px);
      width: min(520px, 78vw);
      background: rgba(255,255,252,.96);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 22px 24px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: opacity .2s ease, transform .2s ease;
    }
    .data-zone:hover .data-popover { opacity: 1; transform: translateY(0); }
    .popover-row {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #55544d;
      font-size: 14px;
      line-height: 1.8;
      font-weight: 400;
      white-space: normal;
    }
    .popover-row + .popover-row { margin-top: 10px; }
    .pop-dot { width: 20px; height: 8px; border-radius: 999px; flex: 0 0 auto; background: var(--ink); }
    .pop-dot.pink { background: var(--pink); }
    .pop-dot.purple { background: var(--purple); }
    .source-sep { width: 1px; height: 14px; background: var(--line-soft); display: inline-block; }
    body.is-scrolled .topbar { box-shadow: 0 12px 34px rgba(17,17,15,.05); }
    body.is-scrolled .topbar-inner { min-height: 72px; padding: 17px 42px 15px; }
    body.is-scrolled .brand-title { font-size: 22px; letter-spacing: -0.06em; }
    body.is-scrolled .design-lockup { opacity: 0; width: 0; margin-left: -12px; transform: translateY(4px); pointer-events: none; }
    body.is-scrolled .data-zone { gap: 32px; }
    body.is-scrolled .data-item strong { font-size: 22px; font-weight: 400; letter-spacing: -0.04em; }
    body.is-scrolled .data-dot { width: 12px; height: 5px; }
    body.is-scrolled .data-item span:last-child { font-size: 12px; }
    .nav-shell {
      position: sticky;
      top: var(--header-h);
      z-index: 40;
      background: linear-gradient(180deg, rgba(247,247,245,.96), rgba(247,247,245,.82));
      backdrop-filter: blur(18px);
      padding: 20px 0 14px;
      transition: top .28s ease, padding .28s ease;
      border-bottom: 1px solid transparent;
    }
    body.is-scrolled .nav-shell { padding: 10px 0 8px; border-bottom-color: var(--line-soft); }
    .mode-tabs {
      width: max-content;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,252,.78);
      box-shadow: 0 20px 44px rgba(17,17,15,.06);
    }
    .mode-tab {
      min-width: 164px;
      height: 54px;
      padding: 0 28px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--paper);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      font-size: 20px;
      line-height: 1;
      font-weight: 400;
      letter-spacing: -0.06em;
      transition: min-width .28s ease, padding .28s ease, background .2s ease, border-color .2s ease, transform .2s ease;
    }
    .mode-tab:hover { transform: translateY(-1px); }
    .mode-tab.active { background: var(--yellow); border-color: var(--yellow-deep); }
    .mode-tab svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 1.85; stroke-linecap: round; stroke-linejoin: round; fill: none; flex: 0 0 auto; }
    .mode-tab .tab-label {
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      opacity: 1;
      max-width: 96px;
      transition: max-width .28s ease, opacity .22s ease, margin .28s ease;
    }
    body.is-scrolled .mode-tab { min-width: 56px; width: 56px; height: 46px; padding: 0; gap: 0; }
    body.is-scrolled .mode-tab .tab-label { opacity: 0; max-width: 0; margin-left: 0; }
    body.is-scrolled .mode-tab svg { width: 22px; height: 22px; }
    .nav-hint {
      width: min(1040px, calc(100vw - 64px));
      margin: 10px auto 0;
      text-align: center;
      color: #8a8982;
      font-size: 12px;
      line-height: 1.6;
      font-weight: 400;
      transition: opacity .24s ease, transform .24s ease, height .24s ease, margin .24s ease;
    }
    body.is-scrolled .nav-hint { opacity: 0; transform: translateY(-4px); height: 0; margin-top: 0; overflow: hidden; }
    main { padding: 26px 42px 88px; }
    .mode { display: none; }
    .mode.active { display: block; }
    .content-wrap { max-width: 1720px; margin: 0 auto; }
    .preview-toolbar {
      position: sticky;
      top: calc(var(--header-h) + var(--mode-h));
      z-index: 30;
      width: max-content;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,252,.9);
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 44px rgba(17,17,15,.06);
      transition: top .28s ease;
    }
    .preview-label { color: var(--muted); font-size: 14px; padding-left: 8px; }
    .tier-select {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--yellow);
      padding: 11px 42px 11px 18px;
      font-size: 16px;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.03em;
      background-image: linear-gradient(45deg, transparent 50%, #111 50%), linear-gradient(135deg, #111 50%, transparent 50%);
      background-position: calc(100% - 20px) 49%, calc(100% - 14px) 49%;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 28px; }
    .sample-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 16px 42px rgba(17,17,15,.045);
      transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
    }
    .sample-card:hover { transform: translateY(-3px); box-shadow: 0 24px 58px rgba(17,17,15,.08); border-color: #cfcec8; }
    .image-button {
      width: 100%;
      min-height: 310px;
      height: clamp(300px, 25vw, 430px);
      padding: 22px;
      border: 0;
      background: #f2f2ef;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .image-button img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: auto;
      filter: none;
    }
    .zoom-mark {
      position: absolute;
      right: 18px;
      top: 18px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,252,.9);
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      opacity: 0;
      transform: scale(.92);
      transition: opacity .18s ease, transform .18s ease;
    }
    .image-button:hover .zoom-mark { opacity: 1; transform: scale(1); }
    .zoom-mark svg { width: 17px; height: 17px; stroke: var(--ink); stroke-width: 1.8; fill: none; }
    .card-info { padding: 22px 22px 24px; }
    .card-head { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 18px; }
    .sample-id { font-size: 28px; line-height: 1; font-weight: 400; letter-spacing: -0.06em; }
    .tier-badge {
      display: inline-flex;
      align-items: center;
      height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--purple);
      font-size: 14px;
      color: var(--ink);
      font-weight: 400;
    }
    .tier-badge.core { background: var(--pink); color: #111; border-color: #df38ae; }
    .source-line { color: var(--muted); font-size: 13px; margin-top: 6px; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 7px 12px;
      border-radius: 999px;
      background: #f7f7f2;
      border: 1px solid var(--line);
      font-size: 14px;
      line-height: 1;
      color: #34332e;
      font-weight: 400;
      letter-spacing: -0.03em;
    }
    .chip.visual { background: #eefad3; border-color: #d9edaa; }
    .chip.style { background: #eee4ff; border-color: #decdf8; }
    .analysis-list { display: grid; gap: 28px; }
    .analysis-item {
      display: grid;
      grid-template-columns: minmax(380px, .95fr) minmax(380px, 1.05fr);
      gap: 32px;
      align-items: stretch;
      padding: 0 0 28px;
      border-bottom: 1px solid var(--line);
    }
    .analysis-image {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #f2f2ef;
      min-height: 360px;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .analysis-image img { width: 100%; height: 100%; max-height: 560px; object-fit: contain; }
    .analysis-copy { padding: 18px 0; }
    .analysis-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 22px; }
    .analysis-title { font-size: 34px; line-height: 1; font-weight: 400; letter-spacing: -0.06em; margin: 0; }
    .section-title {
      margin: 26px 0 10px;
      color: #5e5d56;
      font-size: 13px;
      line-height: 1;
      font-weight: 400;
      letter-spacing: .02em;
    }
    .palette { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; margin: 14px 0 20px; }
    .color-token { display: inline-flex; flex-direction: column; align-items: center; gap: 7px; color: #33332e; font-size: 12px; }
    .swatch { width: 38px; height: 38px; border-radius: 50%; border: 2px solid rgba(17,17,15,.16); box-shadow: inset 0 0 0 1px rgba(255,255,255,.35); }
    .note {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line-soft);
      color: #4d4c46;
      font-size: 15px;
      line-height: 1.72;
      white-space: pre-line;
      font-weight: 400;
    }
    .questionnaire { max-width: 1240px; margin: 4px auto 0; }
    .question-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
      margin-bottom: 28px;
    }
    .question-title { margin: 0; font-size: 42px; line-height: 1.05; font-weight: 400; letter-spacing: -0.07em; }
    .copy-btn {
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid var(--ink);
      background: var(--paper);
      color: var(--ink);
      font-size: 16px;
      font-weight: 400;
    }
    .copy-btn:hover { background: var(--yellow); }
    .question-list { border-top: 1px solid var(--line); }
    .question-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 26px;
      padding: 28px 0;
      border-bottom: 1px solid var(--line);
    }
    .q-no { font-size: 26px; line-height: 1.2; font-weight: 400; letter-spacing: -0.04em; }
    .q-text { font-size: 24px; line-height: 1.55; font-weight: 400; letter-spacing: -0.04em; color: #2d2c27; }
    .viewer {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(17,17,15,.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 42px;
    }
    .viewer.open { display: flex; }
    .viewer-panel {
      width: min(1540px, 96vw);
      height: min(900px, 90vh);
      border-radius: 24px;
      background: var(--paper);
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      box-shadow: 0 26px 80px rgba(0,0,0,.26);
    }
    .viewer-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
    }
    .viewer-title { font-size: 20px; font-weight: 400; letter-spacing: -0.04em; }
    .viewer-close {
      border: 0;
      border-radius: 999px;
      background: var(--ink);
      color: white;
      height: 42px;
      padding: 0 18px;
      font-size: 16px;
    }
    .viewer-body {
      min-height: 0;
      overflow: auto;
      padding: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f2f2ef;
    }
    .viewer-body img { max-width: none; width: auto; height: auto; max-height: none; image-rendering: auto; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(12px);
      background: var(--ink);
      color: #fff;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      z-index: 110;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .empty { text-align: center; color: var(--muted); padding: 80px 0; font-size: 16px; }

      .analysis-item { grid-template-columns: 1fr; }

    @media (max-width: 760px) {
      .topbar-inner { padding: 24px 18px 18px; }
      .brand-zone { align-items: flex-start; flex-direction: column; gap: 10px; }
      .brand-title { white-space: normal; font-size: 38px; }
      .data-zone { gap: 18px; overflow-x: auto; justify-content: flex-start; padding-bottom: 8px; }
      main { padding: 20px 16px 72px; }
      .mode-tab { min-width: 112px; padding: 0 16px; font-size: 18px; }
      .grid { grid-template-columns: 1fr; }
      .question-row { grid-template-columns: 1fr; gap: 10px; }
      .q-text { font-size: 19px; }
    }
  </style>

<body>
  <header class="topbar" id="topbar">
    <div class="topbar-inner">
      <div class="brand-zone">
        <h1 class="brand-title">咖乐UI风格探索</h1>
        <span class="design-lockup" aria-label="Design">
          <span class="design-word">Design</span>
          <span class="design-arrow" aria-hidden="true">
            <svg viewBox="0 0 32 18"><path d="M2 9h25" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M20 2.5c3.1 1.9 5.7 4 8 6.5-2.3 2.5-4.9 4.6-8 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          </span>
        </span>
      </div>
      <div class="data-zone" id="dataZone" aria-label="参考图数据">
        <div class="data-item"><strong id="countAll">0</strong><i class="data-dot"></i><span>全部参考</span></div>
        <div class="data-item"><strong id="countCore">0</strong><i class="data-dot pink"></i><span>核心参考</span></div>
        <div class="data-item"><strong id="countSupport">0</strong><i class="data-dot purple"></i><span>辅助参考</span></div>
        <div class="data-popover" id="dataPopover">
          <div class="popover-row"><i class="pop-dot"></i><span>全部参考：APP 截图 <span id="appCount">0</span></span><i class="source-sep"></i><span>网络设计图 <span id="webCount">0</span></span></div>
          <div class="popover-row"><i class="pop-dot pink"></i><span>核心参考：设计精致、同类竞品、参考价值大。</span></div>
          <div class="popover-row"><i class="pop-dot purple"></i><span>辅助参考：设计感欠缺，或仅有部分设计细节值得观察。</span></div>
        </div>
      </div>
    </div>
  </header>

  <nav class="nav-shell" id="navShell" aria-label="页面模式切换">

  "哪些风格需要避免？可填写：童趣 / 营销 / 极简 / 科技 / 复古等。"
];
    const modeHints = {
      preview: '先看核心参考有没有你喜欢的，再看辅助参考的设计形式有没有你喜欢的',
      analysis: '你需要做的是感受，感受我为参考图匹配的风格词和你想的一样吗',
      questionnaire: '这些问题是我整理完参考图后想问的问题，你也可以积累几个问题我们共同讨论'
    };

    const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    const tierName = (tier) => tier === 'core' ? '核心参考' : '辅助参考';
    const tierClass = (tier) => tier === 'core' ? 'core' : 'support';
    const byId = (id) => document.getElementById(id);

    function setHeaderMetrics() {
      const all = samples.length;
      const core = samples.filter(item => item.tier === 'core').length;
      const support = samples.filter(item => item.tier === 'support').length;
      const app = samples.filter(item => item.source === 'APP来源').length;
      const web = samples.filter(item => item.source === '网络来源').length;
      byId('countAll').textContent = all;
      byId('countCore').textContent = core;
      byId('countSupport').textContent = support;
      byId('appCount').textContent = app;
      byId('webCount').textContent = web;
    }

    function renderChips(tags, type, limit = 6) {
      const selected = (tags || []).filter(Boolean).slice(0, limit);
      if (!selected.length) return '';
      return selected.map(tag => `<span class="chip ${type}">${escapeHtml(tag)}</span>`).join('');
    }

    function renderPalette(colors) {
      const valid = (colors || []).filter(Boolean).slice(0, 6);
      if (!valid.length) return '<span class="chip">暂无记录色卡</span>';
      return valid.map(hex => `<span class="color-token"><i class="swatch" style="background:${escapeHtml(hex)}"></i><span>${escapeHtml(hex)}</span></span>`).join('');
    }

    function openViewer(sample) {
      byId('viewerTitle').textContent = `${sample.id} | ${sample.filename}`;
      const image = byId('viewerImage');
      image.src = sample.image;
      image.alt = `${sample.id} ${sample.filename}`;
      byId('viewer').classList.add('open');
      byId('viewer').setAttribute('aria-hidden', 'false');
    }

    function closeViewer() {
      byId('viewer').classList.remove('open');
      byId('viewer').setAttribute('aria-hidden', 'true');
      byId('viewerImage').removeAttribute('src');
    }

    function renderPreview() {
      const filter = byId('tierFilter').value;
      const list = samples.filter(item => filter === 'all' || item.tier === filter);
      const root = byId('previewGrid');
      root.innerHTML = list.length ? list.map(sample => `
        <article class="sample-card" data-tier="${sample.tier}">
          <button class="image-button" type="button" data-view-id="${sample.id}" aria-label="查看 ${sample.id} 大图">
            <img src="${escapeHtml(sample.image)}" alt="${escapeHtml(sample.id + ' ' + sample.filename)}" loading="eager" fetchpriority="high" decoding="async">
            <span class="zoom-mark" aria-hidden="true"><svg viewBox="0 0 20 20"><circle cx="8.4" cy="8.4" r="5.2"/><path d="M12.4 12.4 17 17"/></svg></span>
          </button>
          <div class="card-info">
            <div class="card-head">
              <div><div class="sample-id">${sample.id}</div><div class="source-line">${escapeHtml(sample.source)} · ${escapeHtml(sample.filename)}</div></div>
              <span class="tier-badge ${tierClass(sample.tier)}">${tierName(sample.tier)}</span>
            </div>
            <div class="chip-row">${renderChips(sample.visualTags, 'visual', 4)}${renderChips(sample.styleTags, 'style', 2)}</div>
          </div>
        </article>`).join('') : '<div class="empty">当前筛选下暂无参考图。</div>';
    }

    function renderAnalysis() {
      const root = byId('analysisList');
      root.innerHTML = samples.map(sample => `
        <article class="analysis-item">
          <button class="analysis-image" type="button" data-view-id="${sample.id}" aria-label="查看 ${sample.id} 大图"><img src="${escapeHtml(sample.image)}" alt="${escapeHtml(sample.id + ' ' + sample.filename)}" loading="lazy" decoding="async"></button>
          <div class="analysis-copy">
            <div class="analysis-head">
              <div><h2 class="analysis-title">${sample.id} | ${escapeHtml(sample.filename)}</h2><div class="source-line">${escapeHtml(sample.source)}</div></div>
              <span class="tier-badge ${tierClass(sample.tier)}">${tierName(sample.tier)}</span>
            </div>
            <div class="section-title">参考图色卡</div>
            <div class="palette">${renderPalette(sample.colors)}</div>
            <div class="section-title">记录视觉元素</div>
            <div class="chip-row">${renderChips(sample.visualTags, 'visual', 99) || '<span class="chip">暂无记录</span>'}</div>
            <div class="section-title">记录风格印象</div>
            <div class="chip-row">${renderChips(sample.styleTags, 'style', 99) || '<span class="chip">暂无记录</span>'}</div>
            ${sample.note ? `<div class="note">${escapeHtml(sample.note)}</div>` : ''}
          </div>
        </article>`).join('');
    }

    function renderQuestions() {
      byId('questionList').innerHTML = questions.map((question, index) => `
        <div class="question-row">
          <div class="q-no">Q${index + 1}</div>
          <div class="q-text">${escapeHtml(question)}</div>
        </div>`).join('');
    }

    function setMode(mode) {
      document.querySelectorAll('.mode').forEach(node => node.classList.toggle('active', node.id === mode));
      document.querySelectorAll('.mode-tab').forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
      byId('navHint').textContent = modeHints[mode] || modeHints.preview;
      requestAnimationFrame(updateStickyMetrics);
    }

    function updateStickyMetrics() {
      const headerH = byId('topbar').getBoundingClientRect().height;
      const navH = byId('navShell').getBoundingClientRect().height;
      document.documentElement.style.setProperty('--header-h', `${Math.ceil(headerH)}px`);
      document.documentElement.style.setProperty('--mode-h', `${Math.ceil(navH)}px`);
    }

    function handleScroll() {
      document.body.classList.toggle('is-scrolled', window.scrollY > 48);
      updateStickyMetrics();
    }

    async function copyQuestions() {
      const text = questions.map((q, i) => `Q${i + 1} ${q}`).join('\n\n');
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const area = document.createElement('textarea');
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand('copy');
        area.remove();
      }
      const toast = byId('toast');
      toast.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
    }

    document.addEventListener('click', event => {
      const modeBtn = event.target.closest('.mode-tab');
      if (modeBtn) setMode(modeBtn.dataset.mode);
      const viewBtn = event.target.closest('[data-view-id]');
      if (viewBtn) {
        const sample = samples.find(item => item.id === viewBtn.dataset.viewId);
        if (sample) openViewer(sample);
      }
    });
    byId('tierFilter').addEventListener('change', renderPreview);
    byId('viewerClose').addEventListener('click', closeViewer);
    byId('viewer').addEventListener('click', event => { if (event.target.id === 'viewer') closeViewer(); });
    byId('copyQuestions').addEventListener('click', copyQuestions);
    window.addEventListener('scroll', handleScroll, { passive: true });
    window.addEventListener('resize', updateStickyMetrics);
    document.addEventListener('keydown', event => { if (event.key === 'Escape') closeViewer(); });

    setHeaderMetrics();
    renderPreview();
    renderAnalysis();
    renderQuestions();
    updateStickyMetrics();
    setTimeout(updateStickyMetrics, 60);
  </script>
</body>
</html>
