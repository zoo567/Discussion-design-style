      const viewer = byId('viewer');
      if (!viewer.classList.contains('open')) return;
      clearTimeout(viewerCloseTimer);
      viewer.setAttribute('aria-hidden', 'true');
      viewerCloseTimer = closeFloatingLayer(viewer, '.viewer-panel', () => {
        viewer.classList.remove('has-gallery');
        byId('viewerImage').removeAttribute('src');
        viewerGallery = [];
        viewerIndex = -1;
      });
    }

    function moveViewer(step) {
      if (!viewerGallery.length) return;
      const nextIndex = viewerIndex + step;
      if (nextIndex < 0 || nextIndex >= viewerGallery.length) return;
      viewerIndex = nextIndex;
      renderViewerSample();
    }

    function analysisCopyHtml(sample, compact = false) {
      const info = meta(sample);
      return `
        <div class="analysis-copy${compact ? ' detail-copy' : ''}">
          <div class="analysis-head">
            <h2 class="analysis-title">${escapeHtml(sample.id)}</h2>
            ${compact ? `
              <div class="display-file">${escapeHtml(info.slug)}</div>
              <div class="source-line">${escapeHtml(info.name)} · ${escapeHtml(sample.source)}</div>
            ` : `
              <div class="analysis-meta-text">
                <div class="display-file">${escapeHtml(info.slug)}</div>
                <div class="display-file">${escapeHtml(info.name)}</div>
              </div>
            `}
          </div>
          <div class="analysis-section first">
            <div class="section-title">记录风格印象</div>
            <div class="chip-row">${renderChips(sample.styleTags, 'style', 99) || '<span class="chip">暂无记录</span>'}</div>
          </div>
          <div class="analysis-section">
            <div class="section-title">概括视觉元素</div>
            <div class="chip-row">${renderChips(sample.visualTags, 'visual', 99) || '<span class="chip">暂无记录</span>'}</div>
          </div>
          <div class="analysis-section palette-line">
            <div class="section-title">参考图色卡</div>
            <div class="palette">${renderPalette(sample.colors)}</div>
          </div>
          ${sample.note ? `<div class="analysis-note">${escapeHtml(sample.note)}</div>` : ''}
          ${compact ? `<div class="analysis-tier-foot"><span class="tier-badge ${tierClass(sample.tier)}">${tierName(sample.tier)}</span></div>` : ''}
        </div>`;
    }

    function openDetail(sample) {
      const info = meta(sample);
      const detailViewer = byId('detailViewer');
      clearTimeout(detailCloseTimer);
      detailViewer.classList.remove('is-closing');
      prepareFloatingLayer(detailViewer, '.detail-panel');
      byId('detailTitle').textContent = `${info.name} · ${tierName(sample.tier)}`;
      byId('detailBody').innerHTML = `
        <button class="detail-image" type="button" data-view-id="${sample.id}" aria-label="查看 ${escapeHtml(info.name)} 大图">
          <img src="${escapeHtml(sample.image)}" alt="${escapeHtml(info.name)}" decoding="async">
        </button>
        ${analysisCopyHtml(sample, true)}`;
      detailViewer.classList.add('open');
      detailViewer.setAttribute('aria-hidden', 'false');
      requestAnimationFrame(() => animateFloatingIn(detailViewer, '.detail-panel'));
    }

    function closeDetail() {
      const detailViewer = byId('detailViewer');
      if (!detailViewer.classList.contains('open')) return;
      clearTimeout(detailCloseTimer);
      detailViewer.setAttribute('aria-hidden', 'true');
      detailCloseTimer = closeFloatingLayer(detailViewer, '.detail-panel', () => {
        byId('detailBody').innerHTML = '';
      });
    }

    function renderPreview() {
      const filter = activeTierFilter;
      const list = samples.filter(item => filter === 'all' || item.tier === filter);
      const root = byId('previewGrid');
      root.innerHTML = list.length ? list.map(sample => `
        <article class="sample-card" data-tier="${sample.tier}" data-detail-id="${sample.id}" tabindex="0" role="button" aria-label="查看 ${escapeHtml(meta(sample).name)} 的风格解析">
          <div class="image-button" data-view-id="${sample.id}" aria-label="查看 ${escapeHtml(meta(sample).name)} 大图">
            <img src="${escapeHtml(sample.image)}" alt="${escapeHtml(meta(sample).name)}" loading="eager" fetchpriority="high" decoding="sync">
            <button class="zoom-mark" type="button" data-view-id="${sample.id}" aria-label="查看 ${escapeHtml(meta(sample).name)} 大图"><svg viewBox="0 0 20 20"><circle cx="8.4" cy="8.4" r="5.2"/><path d="M12.4 12.4 17 17"/></svg></button>
          </div>
          <div class="card-info">
            <div class="card-head">
              <div><div class="sample-id">${escapeHtml(sample.id)} | ${escapeHtml(meta(sample).name)}</div><div class="source-line">${escapeHtml(meta(sample).slug)} · ${escapeHtml(sample.source)}</div></div>
              <span class="tier-badge ${tierClass(sample.tier)}">${tierName(sample.tier)}</span>
            </div>
            <div class="chip-row">${renderChips(sample.visualTags, 'visual', 4)}${renderChips(sample.styleTags, 'style', 2)}</div>
          </div>
        </article>`).join('') : '<div class="empty">当前筛选下暂无参考图。</div>';
      requestAnimationFrame(setupPreviewStagger);
    }

    function renderAnalysis() {
      const root = byId('analysisList');
      const list = currentAnalysisSamples();
      const activeId = normalizedAnalysisId(list);
      const sample = list.find(item => item.id === activeId);
      const index = Math.max(0, list.findIndex(item => item.id === activeId));
      renderAnalysisIndex(list);
      root.innerHTML = sample ? `
        <article class="analysis-item" data-analysis-id="${escapeHtml(sample.id)}">
          <div class="analysis-visual">
            <button class="analysis-image" type="button" data-view-id="${sample.id}" aria-label="查看 ${escapeHtml(meta(sample).name)} 大图">
              <span class="analysis-image-frame">
                <span class="analysis-image-inner">
                  <img src="${escapeHtml(sample.image)}" alt="${escapeHtml(meta(sample).name)}" loading="lazy" decoding="async">
                  <span class="tier-badge ${tierClass(sample.tier)}">${tierName(sample.tier)}</span>
                </span>
              </span>
            </button>
          </div>
          ${analysisCopyHtml(sample)}
        </article>
        <div class="analysis-switcher" aria-label="${escapeHtml(meta(sample).name)} 上下切换">
          <button class="analysis-step prev" type="button" data-analysis-move="-1" data-analysis-from="${sample.id}" ${index === 0 ? 'disabled' : ''} aria-label="上一张参考"><svg viewBox="0 0 18 24"><path d="M3 12h12"/><path d="M9.5 6 15 12l-5.5 6"/></svg></button>
          <button class="analysis-step next" type="button" data-analysis-move="1" data-analysis-from="${sample.id}" ${index === list.length - 1 ? 'disabled' : ''} aria-label="下一张参考"><svg viewBox="0 0 18 24"><path d="M3 12h12"/><path d="M9.5 6 15 12l-5.5 6"/></svg></button>
        </div>` : '<div class="empty">当前筛选下暂无参考图。</div>';
      if (document.body.dataset.mode === 'analysis') {
        requestAnimationFrame(() => {
          syncAnalysisPanelHeight();
          syncAnalysisIndex();
        });
      }
    }

    function renderQuestions() {
      byId('questionList').innerHTML = questions.map((question, index) => `
        <div class="question-row">
          <div class="q-no">Q${index + 1}</div>
          <div class="q-text">${escapeHtml(question)}</div>
        </div>`).join('');
    }

    const navPressTimers = new WeakMap();
    const navEnterTimers = new WeakMap();

    function runModeTabPress(btn) {
      if (prefersReducedMotion || !btn) return;
      clearTimeout(navPressTimers.get(btn));
      btn.classList.remove('is-pressing');
      void btn.offsetWidth;
      btn.classList.add('is-pressing');
      navPressTimers.set(btn, window.setTimeout(() => btn.classList.remove('is-pressing'), 140));
    }

    function runModeTabEnter(btn) {
      if (prefersReducedMotion || !btn) return;
      clearTimeout(navEnterTimers.get(btn));
      btn.classList.remove('is-entering');
      void btn.offsetWidth;
      btn.classList.add('is-entering');
      navEnterTimers.set(btn, window.setTimeout(() => btn.classList.remove('is-entering'), 360));
    }

    function setMode(mode) {
      const previousMode = document.body.dataset.mode;
      let activeTab = null;
      document.body.dataset.mode = mode;
      document.querySelectorAll('.mode').forEach(node => node.classList.toggle('active', node.id === mode));
      document.querySelectorAll('.mode-tab').forEach(btn => {
        const active = btn.dataset.mode === mode;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', active ? 'true' : 'false');
        if (active) activeTab = btn;
      });
      if (previousMode !== mode) runModeTabEnter(activeTab);
      byId('navHint').textContent = modeHints[mode] || modeHints.preview;
      requestAnimationFrame(() => {
        updateStickyMetrics();
        if (mode === 'analysis') {
          normalizedAnalysisId();
          renderAnalysis();
          syncAnalysisIndex();
          window.scrollTo({ top: 0, behavior: 'auto' });
        }
      });
    }

    function setTierFilter(value) {
      activeTierFilter = value;
      document.querySelectorAll('[data-tier-filter]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tierFilter === value);
        btn.setAttribute('aria-selected', btn.dataset.tierFilter === value ? 'true' : 'false');
      });
      document.querySelectorAll('.preview-toolbar').forEach(node => node.dataset.filter = value);
      byId('tierSelectLabel').textContent = tierFilterName(value);
      byId('tierSelectTrigger').setAttribute('aria-expanded', 'false');
      document.querySelectorAll('.preview-toolbar').forEach(node => node.classList.remove('open'));
      renderPreview();
      renderAnalysis();
      if (document.body.dataset.mode === 'analysis') requestAnimationFrame(() => window.scrollTo({ top: 0, behavior: 'auto' }));
    }

    function updateStickyMetrics() {
      const topH = byId('topbar').getBoundingClientRect().height;
      document.documentElement.style.setProperty('--header-h', `${Math.ceil(topH)}px`);
      const navH = byId('navShell').getBoundingClientRect().height;
      document.documentElement.style.setProperty('--mode-h', `${Math.ceil(navH)}px`);
      updateAnalysisStageMetrics();
    }

    function handleScroll() {
      scheduleAnalysisSync();
      document.body.classList.toggle('is-scrolled', window.scrollY > 8);
    }

    function handleAnalysisWheel(event) {
      if (document.body.dataset.mode !== 'analysis') return;
      if (byId('viewer').classList.contains('open') || byId('detailViewer').classList.contains('open')) return;
      if (event.target?.closest?.('.topbar, .nav-shell, .analysis-index, .viewer, .detail-viewer')) return;
      if (Math.abs(event.deltaY) < Math.abs(event.deltaX)) return;
      const list = currentAnalysisSamples();
      if (!list.length) return;
      const currentId = activeAnalysisId();
      event.preventDefault();
      if (analysisWheelLocked) return;
      analysisWheelDelta += event.deltaY;
      clearTimeout(analysisWheelTimer);
      analysisWheelTimer = window.setTimeout(() => { analysisWheelDelta = 0; }, 140);
      if (Math.abs(analysisWheelDelta) < 55) return;
      const direction = analysisWheelDelta > 0 ? 1 : -1;
      const moved = moveAnalysis(direction, currentId);
      analysisWheelDelta = 0;
      if (!moved) return;
      analysisWheelLocked = true;
      window.setTimeout(() => { analysisWheelLocked = false; }, 520);
    }

    async function copyQuestions() {
      const text = questions.map((q, i) => `Q${i + 1} ${q}`).join('\n\n');
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const area = document.createElement('textarea');
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand('copy');
        area.remove();
      }
      const toast = byId('toast');
      toast.textContent = '已复制全部问题';
      toast.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
    }

    async function copyText(text, message = '已复制') {
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const area = document.createElement('textarea');
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand('copy');
        area.remove();
      }
      const toast = byId('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
    }

    document.addEventListener('click', event => {
      const modeBtn = event.target.closest('.mode-tab');
      if (modeBtn) {
        runModeTabPress(modeBtn);
        setMode(modeBtn.dataset.mode);
      }
      const tierTrigger = event.target.closest('#tierSelectTrigger');
      if (tierTrigger) {
        const toolbar = tierTrigger.closest('.preview-toolbar');
        const nextOpen = !toolbar.classList.contains('open');
        toolbar.classList.toggle('open', nextOpen);
        tierTrigger.setAttribute('aria-expanded', nextOpen ? 'true' : 'false');
        return;
      }
      const colorBtn = event.target.closest('[data-copy-color]');
      if (colorBtn) {
        event.stopPropagation();
        copyText(colorBtn.dataset.copyColor, `已复制 ${colorBtn.dataset.copyColor}`);
        return;
      }
      const analysisMove = event.target.closest('[data-analysis-move]');
      if (analysisMove) {
        moveAnalysis(Number(analysisMove.dataset.analysisMove), analysisMove.dataset.analysisFrom);
        return;
      }
      const analysisJump = event.target.closest('[data-analysis-jump]');
      if (analysisJump) {
        jumpToAnalysis(analysisJump.dataset.analysisJump);
        return;
      }
      const tierBtn = event.target.closest('[data-tier-filter]');
      if (tierBtn) {
        setTierFilter(tierBtn.dataset.tierFilter);
        return;
      }
      const viewBtn = event.target.closest('[data-view-id]');
      if (viewBtn) {
        event.stopPropagation();
        const sample = samples.find(item => item.id === viewBtn.dataset.viewId);
        if (sample) openViewer(sample, viewBtn.closest('#preview') ? currentFilteredSamples() : [sample]);
        return;
      }
      const detailCard = event.target.closest('[data-detail-id]');
      if (detailCard) {
        const sample = samples.find(item => item.id === detailCard.dataset.detailId);
        if (sample) openDetail(sample);
      }
      if (!event.target.closest('.preview-toolbar')) {
        document.querySelectorAll('.preview-toolbar').forEach(node => node.classList.remove('open'));
        byId('tierSelectTrigger')?.setAttribute('aria-expanded', 'false');
      }
    });
    document.addEventListener('keydown', event => {
      const detailCard = event.target.closest?.('[data-detail-id]');
      if (detailCard && (event.key === 'Enter' || event.key === ' ')) {
        event.preventDefault();
        const sample = samples.find(item => item.id === detailCard.dataset.detailId);
        if (sample) openDetail(sample);
      }
    });
    byId('viewerClose').addEventListener('click', closeViewer);
    byId('viewerPrev').addEventListener('click', () => moveViewer(-1));
    byId('viewerNext').addEventListener('click', () => moveViewer(1));
    byId('viewer').addEventListener('click', event => { if (event.target.id === 'viewer') closeViewer(); });
    byId('detailClose').addEventListener('click', closeDetail);
    byId('detailViewer').addEventListener('click', event => { if (event.target.id === 'detailViewer') closeDetail(); });
    byId('copyQuestions').addEventListener('click', copyQuestions);
    window.addEventListener('scroll', handleScroll, { passive: true });
    window.addEventListener('wheel', handleAnalysisWheel, { passive: false });
    window.addEventListener('resize', () => {
      updateStickyMetrics();
      updateAnalysisStageMetrics();
    });
    document.addEventListener('load', event => {
      if (event.target?.matches?.('#analysisList img')) {
        updateAnalysisStageMetrics();
        scheduleAnalysisSync();
      }
    }, true);
    document.addEventListener('keydown', event => {
      if (byId('viewer').classList.contains('open')) {
        if (event.key === 'ArrowLeft') moveViewer(-1);
        if (event.key === 'ArrowRight') moveViewer(1);
      }
      const viewerOpen = byId('viewer').classList.contains('open');
      const detailOpen = byId('detailViewer').classList.contains('open');
      const isTypingTarget = ['INPUT', 'TEXTAREA', 'SELECT'].includes(event.target?.tagName) || event.target?.isContentEditable;
      const tierMenuOpen = !!document.querySelector('.preview-toolbar.open');
      if (
        document.body.dataset.mode === 'analysis' &&
        !viewerOpen &&
        !detailOpen &&
        !isTypingTarget &&
        !tierMenuOpen &&
        (event.key === 'ArrowUp' || event.key === 'ArrowDown')
      ) {
        event.preventDefault();
        moveAnalysis(event.key === 'ArrowDown' ? 1 : -1);
      }
      if (event.key === 'Escape') {
        document.querySelectorAll('.preview-toolbar').forEach(node => node.classList.remove('open'));
        byId('tierSelectTrigger')?.setAttribute('aria-expanded', 'false');
        closeViewer();
        closeDetail();
      }
    });

    setHeaderMetrics();
    document.body.dataset.mode = 'preview';
    renderPreview();
    renderAnalysis();
    renderQuestions();
    updateStickyMetrics();
    setTimeout(updateStickyMetrics, 60);
  </script>
</body>
</html>
